  max: 2
- id: '1662239356385'
  alias: Money control
  description: ''
  trigger:
  - platform: event
    event_type: telegram_command
    event_data:
      command: /saldo
      chat_id: 303515965
    id: saldo
  - platform: event
    event_type: telegram_command
    event_data:
      command: /add
      chat_id: 303515965
    id: add
  - platform: event
    event_type: telegram_command
    event_data:
      command: /substract
      chat_id: 303515965
    id: substract
  condition: []
  action:
  - choose:
    - conditions:
      - condition: trigger
        id: saldo
      sequence:
      - service: notify.lau
        data:
          message: '¡Holii! Tu saldo es {{ states("input_number.lau_saldo") }} €.

            Puedes escribir /add (cantidades de dinero a añadir) o /substract (cantidades
            de dinero a retirar) para modificar la cantidad.'
    - conditions:
      - condition: trigger
        id: add
      sequence:
      - if:
        - condition: template
          value_template: '{{ (trigger.event.data[''args''] | count) >= 1 }}'
        then:
        - service: input_number.set_value
          data:
            value: "{% set aux = namespace(s=(0|float)) %} \n{% for i in range((trigger.event.data['args']|count))
              %}\n  {% set aux.s = aux.s + (trigger.event.data['args'][i].replace(\"'\",'.').replace(',','.')
              | float) %}\n{% endfor %} \n\n{{ (states('input_number.lau_saldo') |
              float) + (aux.s | float) }}"
          target:
            entity_id: input_number.lau_saldo
        - service: notify.lau
          data:
            message: Tu saldo ahora es {{ states("input_number.lau_saldo") }} €.
        else:
        - service: notify.lau
          data:
            message: Error en los argumentos, ¡vuelve a intentarlo!
    - conditions:
      - condition: trigger
        id: substract
      sequence:
      - if:
        - condition: template
          value_template: '{{ (trigger.event.data[''args''] | count) >= 1 }}'
        then:
        - service: input_number.set_value
          data:
            value: "{% set aux = namespace(s=(0|float)) %} \n{% for i in range((trigger.event.data['args']|count))
              %}\n  {% set aux.s = aux.s + (trigger.event.data['args'][i].replace(\"'\",'.').replace(',','.')
              | float) %}\n{% endfor %} \n\n{{ (states('input_number.lau_saldo') |
              float) - (aux.s | float) }}"
          target:
            entity_id: input_number.lau_saldo
        - service: notify.lau
          data:
            message: Tu saldo ahora es {{ states("input_number.lau_saldo") }} €.
        else:
        - service: notify.lau
          data:
            message: Error en los argumentos, ¡vuelve a intentarlo!
    default: []
  mode: single

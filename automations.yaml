- id: '1650113623089'
  alias: Randomise guest room lights behaviour
  description: ''
  triggers:
  - at: sensor.guest_room_security_start
    id: start_time
    trigger: time
  - event: start
    id: ha_start
    trigger: homeassistant
  - at: sensor.guest_room_security_end
    id: end_time
    trigger: time
  - at: sensor.guest_room_bathroom_event
    id: bathroom_event
    trigger: time
  - at: 02:00:00
    id: two_am
    trigger: time
  - entity_id:
    - input_boolean.guest_room_occupied
    to: 'off'
    id: not_occupied
    trigger: state
  conditions:
  - condition: state
    entity_id: input_boolean.guest_room_occupied
    state: 'off'
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: start_time
      sequence:
      - data: {}
        target:
          entity_id: light.guest_dresser
        action: light.turn_on
        enabled: true
    - conditions:
      - condition: or
        conditions:
        - condition: trigger
          id: ha_start
        - condition: trigger
          id: not_occupied
      sequence:
      - data: {}
        target:
          entity_id: light.guest_room_lights
        action: light.turn_off
      - condition: template
        value_template: '{{ (states(''sensor.guest_room_security_start'') | as_timestamp)
          < utcnow().timestamp() < (states(''sensor.guest_room_security_end'') | as_timestamp)
          }}

          '
      - data: {}
        target:
          entity_id: light.guest_dresser
        action: light.turn_on
        enabled: true
    - conditions:
      - condition: or
        conditions:
        - condition: trigger
          id: end_time
        - condition: trigger
          id: two_am
      sequence:
      - data: {}
        target:
          entity_id: light.guest_room_lights
        action: light.turn_off
    - conditions:
      - condition: trigger
        id: bathroom_event
      sequence:
      - data: {}
        target:
          entity_id: script.guest_room_security_ligths_bathroom_event
        action: script.turn_on
  variables:
    first_event_on: '{{ (state_attr(''sun.sun'', ''next_setting'') | as_datetime |
      as_timestamp) + ((range(-10, 20)|random|int) * 60) }}'
    second_event_off: '{{ first_event_on + (range(30, 70)|random|int) * 60 }}'
    second_event_on: '{{ second_event_off - (range(1, 4)|random|int) * 60 }}'
    third_event_off: '{{ second_event_on + (range(40, 90)|random|int) * 60 }}'
    third_event_on: '{{ third_event_off - (range(1, 4)|random|int) * 60 }}'
    fourth_event_off: '{{ third_event_on + (range(30, 60)|random|int) * 60 }}'
    fourth_event_on: '{{ fourth_event_off - (range(1, 4)|random|int) * 60 }}'
    fifth_event_off: '{{ (state_attr(''sun.sun'', ''next_rising'') | as_datetime |
      as_timestamp) + ((range(-20, 10)|random|int) * 60) }}'
  mode: single
- id: '1650498048252'
  alias: House modes
  description: ''
  triggers:
  - at: sensor.sunset_offset
    id: sunset
    trigger: time
  - at: sensor.sunrise_offset
    id: sunrise
    trigger: time
  - event: start
    id: ha_start
    trigger: homeassistant
  - entity_id: input_boolean.dining_mode
    to: 'on'
    id: dining_mode_on
    trigger: state
  - entity_id: input_boolean.dining_mode
    to: 'off'
    id: dining_mode_off
    trigger: state
  - entity_id: input_boolean.modo_tv
    to: 'on'
    id: modo_tv_on
    trigger: state
  - entity_id: input_boolean.modo_tv
    to: 'off'
    id: modo_tv_off
    trigger: state
  - entity_id: binary_sensor.open_windows_mode
    to: 'on'
    id: windows_open
    trigger: state
  - entity_id: binary_sensor.open_windows_mode
    to: 'off'
    id: windows_closed
    trigger: state
  - at: 02:00:00
    id: two_am
    trigger: time
  - entity_id:
    - media_player.lg_webos_tv_um7000pla
    to:
    - unavailable
    - 'off'
    for:
      hours: 0
      minutes: 5
      seconds: 0
    id: lg_tv_off
    trigger: state
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: sunset
      sequence:
      - condition: and
        conditions:
        - condition: state
          entity_id: input_boolean.dining_mode
          state: 'off'
        - condition: state
          entity_id: binary_sensor.open_windows_mode
          state: 'off'
      - data: {}
        target:
          entity_id: script.security_lights_turn_on_lights
        action: script.turn_on
    - conditions:
      - condition: trigger
        id: sunrise
      sequence:
      - data: {}
        target:
          entity_id: light.security_lights
        action: light.turn_off
    - conditions:
      - condition: trigger
        id: ha_start
      sequence:
      - condition: template
        value_template: '{{  (utcnow().strftime(''%T'')) > (states(''sensor.sunset_offset'')
          | as_datetime).strftime(''%T'') or (utcnow().strftime(''%T'')) < (states(''sensor.sunrise_offset'')
          | as_datetime).strftime(''%T'') }}

          '
      - data: {}
        target:
          entity_id: light.security_lights
        action: light.turn_off
      - data: {}
        target:
          entity_id:
          - script.security_lights_corridor
          - script.security_lights_dining_room
          - script.security_lights_living_room_sofa
          - script.security_lights_living_room_window
        action: script.turn_off
      - condition: state
        entity_id: input_boolean.dining_mode
        state: 'off'
      - data: {}
        target:
          entity_id: script.security_lights_turn_on_lights
        action: script.turn_on
    - conditions:
      - condition: trigger
        id:
        - dining_mode_on
      sequence:

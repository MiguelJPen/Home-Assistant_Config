- id: '1632435586236'
  alias: Reboot Home Assistant if router reboots
  description: Reboots Home Assistant due to some DHCP problems.
  trigger:
  - platform: state
    entity_id: binary_sensor.irrigation_status
    to: 'off'
    for:
      hours: 0
      minutes: 10
      seconds: 0
  - platform: state
    entity_id: binary_sensor.swimming_pool_status
    for:
      hours: 0
      minutes: 10
      seconds: 0
    to: 'off'
  condition:
  - condition: or
    conditions:
    - condition: state
      entity_id: binary_sensor.router
      state: 'off'
    - condition: and
      conditions:
      - condition: state
        entity_id: binary_sensor.swimming_pool_status
        state: 'off'
      - condition: state
        entity_id: binary_sensor.irrigation_status
        state: 'off'
  action:
  - service: hassio.host_reboot
    data: {}
  mode: single
- id: '1639942219645'
  alias: Reset Wireguard connection when no outside router is reachable
  description: If the connection with any wireguard server is lost (for example, due
    to an IP change), restart the wireguard addon to establish the connection again.
  trigger:
  - platform: state
    entity_id: binary_sensor.router_madrid
    to: 'off'
    for:
      hours: 0
      minutes: 5
      seconds: 0
  - platform: state
    entity_id: binary_sensor.router_murcia
    to: 'off'
    for:
      hours: 0
      minutes: 5
      seconds: 0
  condition:
  - condition: state
    entity_id: binary_sensor.router
    state: 'on'
  action:
  - repeat:
      while:
      - condition: and
        conditions:
        - condition: state
          entity_id: binary_sensor.router
          state: 'on'
          for:
            hours: 0
            minutes: 4
            seconds: 0
        - condition: or
          conditions:
          - condition: state
            entity_id: binary_sensor.router_madrid
            state: 'off'
            for:
              hours: 0
              minutes: 0
              seconds: 30
          - condition: state
            entity_id: binary_sensor.router_murcia
            state: 'off'
            for:
              hours: 0
              minutes: 0
              seconds: 30
      sequence:
      - service: hassio.addon_restart
        data:
          addon: fd24a922_wireguard_client
      - delay:
          hours: 0
          minutes: 5
          seconds: 0
          milliseconds: 0
  mode: single

            entity_id: script.security_lights_living_room_sofa
          action: script.turn_off
        - data: {}
          target:
            entity_id: script.security_lights_turn_on_lights
          action: script.turn_on
    - conditions:
      - condition: trigger
        id: modo_tv_off

- id: '1600622835627'
  alias: When disarmed
  description: Turn OFF sirens and second alarm automation, notify by telegram and
    turn OFF security cameras.
  triggers:
  - entity_id:
    - alarm_control_panel.el_nino_alarm
    to: disarmed
    trigger: state
  conditions: []
  actions:
  - data: {}
    target:
      entity_id:
      - siren.sirena_exterior
      - siren.sirena_interior
    action: siren.turn_off
  - if:
    - condition: state
      entity_id: script.arrive_home
      state: 'on'
    then:
    - data: {}
      target:
        entity_id:
        - light.house_facade_east
        - light.house_facade_south_down
        - light.house_facade_south_up
      action: light.turn_off
    else:
    - data: {}
      target:
        entity_id: light.facade_lights
      action: light.turn_off
  - data: {}
    target:
      entity_id:
      - switch.exterior_cameras
      - switch.comedor_motion_detection
    action: switch.turn_off
    enabled: true
  - data:
      stop_actions: true
    target:
      entity_id:
      - automation.alarm_trigger_when_sensors_go_on_second
      - automation.alarm_trigger_when_sensors_go_on_second_home
    action: automation.turn_off
  - data: {}
    action: esphome.alarm_alarm_beep_beep
  - delay:
      hours: 0
      minutes: 0
      seconds: 5
      milliseconds: 0
  - data: {}
    target:
      entity_id: switch.comedor_video_streaming
    action: switch.turn_off
  - action: switch.turn_off
    metadata: {}
    data: {}
    target:
      entity_id:
      - switch.entrada_ftp_upload
      - switch.fachada_sur_ftp_upload
      - switch.fachada_este_ftp_upload
      - switch.fachada_norte_ftp_upload
      - switch.fachada_oeste_ftp_upload
    enabled: true
  mode: single
- id: '1600642629084'
  alias: When armed
  description: Notify by telegram that the alarm is armed and turn on security cameras.
  triggers:
  - entity_id: alarm_control_panel.el_nino_alarm
    to: armed_away
    id: armed_away
    trigger: state
  - entity_id:
    - alarm_control_panel.el_nino_alarm
    to: armed_home
    id: armed_home
    trigger: state
  conditions: []
  actions:
  - data: {}
    action: esphome.alarm_alarm_beep
  - choose:
    - conditions:
      - condition: trigger
        id: armed_away
      sequence:
      - target:
          entity_id:
          - switch.exterior_cameras
          - switch.comedor_motion_detection
        data: {}
        action: switch.turn_on
      - delay:
          hours: 0
          minutes: 0
          seconds: 3
          milliseconds: 0
      - data: {}
        target:
          entity_id: switch.comedor_video_streaming
        action: switch.turn_on
      - if:
        - condition: state
          entity_id: input_boolean.auto_close_blinds_when_armed
          state:
          - 'on'
        then:
        - action: cover.close_cover
          metadata: {}
          data: {}
          target:
            entity_id:
            - cover.kitchen_blind
            - cover.living_room_blind
            - cover.main_bathroom_blind
            - cover.main_dresser_blind
            - cover.main_room_left_blind
            - cover.main_room_right_blind
            - cover.miguel_room_blind
            - cover.patri_room_blind
      - action: switch.turn_off
        metadata: {}
        target:
          entity_id: switch.electric_vehicle_plug
        data: {}
    default:
    - target:
        entity_id:
        - switch.exterior_cameras
      data: {}
      action: switch.turn_on
  mode: single

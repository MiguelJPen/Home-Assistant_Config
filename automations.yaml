- id: '1623189802627'
  alias: Notify home and grid electricity status
  description: ''
  triggers:
  - trigger: numeric_state
    entity_id:
    - sensor.inverter_grid_voltage_l1
    for:
      hours: 0
      minutes: 1
      seconds: 0
    below: 100
    id: grid_down
  - trigger: template
    value_template: '{{ states(''switch.fridge_plug'') in [''unavailable'', ''unknown'']
      and states(''switch.home_automation_office_plug'') in [''unavailable'', ''unknown'']
      and states(''binary_sensor.irrigation_status'') in [''unavailable'', ''unknown'']
      }}'
    for:
      hours: 0
      minutes: 2
      seconds: 0
    id: house_electricy_down
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - grid_down
      sequence:
      - data:
          message: No hay energía en la red eléctrica. El sistema solar y las baterías
            aguantarán el sistema.
          title: Caída de la red eléctrica
        action: notify.group
      - repeat:
          until:
          - condition: numeric_state
            entity_id: sensor.inverter_grid_voltage_l1
            above: 190
          sequence:
          - action: notify.group
            metadata: {}
            data:
              message: 'Estado actual de la batería: {{ states(''sensor.inverter_battery_soc'')
                }}%'
          - if:
            - condition: state
              entity_id: switch.electric_vehicle_plug
              state:
              - 'on'
            - condition: numeric_state
              entity_id: sensor.inverter_battery_power
              above: 100
            then:
            - action: switch.turn_off
              metadata: {}
              target:
                entity_id: switch.electric_vehicle_plug
              data: {}
            - action: notify.group
              metadata: {}
              data:
                message: Se ha desconectado el cargador del coche para ahorrar energía.
                  Recuerda activarlo de nuevo.
          - delay:
              hours: 0
              minutes: 30
              seconds: 0
              milliseconds: 0
      - action: notify.group
        metadata: {}
        data:
          message: Se ha solventado el corte de energía en la red.
    - conditions:
      - condition: trigger
        id:
        - house_electricy_down
      sequence:
      - data:
          message: Parece que no hay electricidad en casa desde las {{ states('sensor.time')
            }}. Por favor, revísalo antes de que el SAI no pueda aguantar la carga
            del sistema.
          title: '*AVISO*'
        enabled: true
        action: notify.group
      - if:
        - condition: numeric_state
          entity_id: sensor.inverter_load_voltage
          below: 100
        then:
        - action: notify.group
          metadata: {}
          data:
            message: Parece que hay un problema con el inversor y no está generando
              electricidad... Revísalo para solucionar el problema.
      - wait_template: '{{ states(''switch.fridge_plug'') not in [''unavailable'',
          ''unknown''] or states(''switch.home_automation_office_plug'') not in [''unavailable'',
          ''unknown''] or states(''binary_sensor.irrigation_status'') not in [''unavailable'',
          ''unknown''] }}'
        continue_on_timeout: true
        timeout:
          hours: 1
          minutes: 0
          seconds: 0
          milliseconds: 0
      - if:
        - condition: template
          value_template: '{{ wait.completed }}'
        then:
        - action: notify.group
          metadata: {}
          data:
            message: Se ha solventado el problema interno de energía en casa.
        else:
        - data:
            message: El sistema se apagará para proteger los datos y garantizar la
              integridad de la información.  En caso de que vuelva la luz, será necesario
              pulsar el botón situado en el frontal del Home Assistant si no se inicia
              automáticamente pasados diez minutos. Desarmando la alarma para evitar
              sorpresas...
            title: '*AVISO IMPORTANTE*'
          enabled: true
          action: notify.group
        - data:
            code: !secret alarm_control_panel_code
          enabled: true
          action: alarm_control_panel.alarm_disarm
          target:
            entity_id: alarm_control_panel.el_nino_alarm
        - delay:
            hours: 0
            minutes: 0
            seconds: 30
            milliseconds: 0
        - data:
            message: Apagando el sistema...
          enabled: true
          action: notify.group
        - data: {}
          enabled: true
          action: hassio.host_shutdown
  mode: single
- id: '1626736527137'
  alias: Change energy tariff
  description: ''
  triggers:
  - entity_id: sensor.pvpc
    attribute: period
    trigger: state
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: sensor.pvpc
        state: P3
        attribute: period
      sequence:
      - target:
          entity_id:
          - select.daily_energy_cost
          - select.monthly_energy_cost
          - select.daily_energy
          - select.monthly_energy
        data:
          option: valle
        action: select.select_option
    - conditions:
      - condition: state
        entity_id: sensor.pvpc
        state: P2
        attribute: period
      sequence:
      - target:
          entity_id:
          - select.daily_energy_cost
          - select.monthly_energy_cost
          - select.daily_energy
          - select.monthly_energy
        data:
          option: llana
        action: select.select_option
    - conditions:
      - condition: state
        entity_id: sensor.pvpc
        state: P1
        attribute: period
      sequence:
      - target:
          entity_id:
          - select.daily_energy_cost
          - select.monthly_energy_cost
          - select.daily_energy
          - select.monthly_energy
        data:
          option: punta
        action: select.select_option
    default:
    - target:
        entity_id:
        - select.daily_energy_cost
        - select.monthly_energy_cost
        - select.daily_energy
        - select.monthly_energy
      data:
        option: valle
      action: select.select_option
  mode: single
- id: '1626868061580'
  alias: Save daily energy consumption at the end of the day
  description: ''
  trigger:
  - platform: time
    at: 00:00:00
  condition: []
  action:
  - service: input_number.set_value
    target:
      entity_id: input_number.yesterday_kwh
    data:
      value: '{% set valle = state_attr(''sensor.daily_energy_valle'', ''last_period'')
        | float %} {% set llana = state_attr(''sensor.daily_energy_llana'', ''last_period'')
        | float %} {% set punta = state_attr(''sensor.daily_energy_punta'', ''last_period'')
        | float %}

        {{ (valle + llana + punta ) }}'
  mode: single
- id: '1626948288438'
  alias: Send energy data to a local file hourly
  description: ''
  triggers:
  - hours: '*'
    minutes: '59'
    seconds: '50'
    trigger: time_pattern
  conditions: []
  actions:
  - target:
      entity_id:
      - notify.collected_energy_data_file
    data:
      message: '{{ states(''sensor.date_time'') }},  {{ ''{:,.3f}''.format(float(states(''sensor.hourly_energy''),
        0)) }}, {{ states(''select.daily_energy'') }}, {{ ''{:,.3f}''.format(float(states(''sensor.daily_energy''),
        0)) }}, {{ ''{:,.2f}''.format(float(states(''sensor.monthly_energy_cost_imp''),
        0)) }} '
    action: notify.send_message
  mode: single
- id: '1628698660992'
  alias: Send files from security cameras
  description: ''
  triggers:
  - event_type: folder_watcher
    event_data:
      event_type: closed
    trigger: event
  conditions: []
  actions:
